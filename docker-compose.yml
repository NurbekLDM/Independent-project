services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: uzbek_text_normalizer
    ports:
      - "5442:5442"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d uzbek_text_normalizer"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: sh -c "npx prisma db push && npm run dev"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@db:5432/uzbek_text_normalizer?schema=public
      AUTH_SECRET: change-me-in-production
    ports:
      - "9000:9000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  pgdata:
